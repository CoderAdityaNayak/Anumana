<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuessNum4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cause:wght@100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">   <style>
        body{
            text-align: center;
            
        }
        h1{
            font-family: 'Outfit';
            font-weight: 500;
            font-size: 3.5vw;

        }
        .container{
            align-items: center;
            font-family: 'DM Sans', Courier, monospace;
            font-weight: 300;
            background-color: aquamarine;
            width: 500px;
            border-radius: 20px;
            margin: 0 auto;
            position: relative;
            transition: 5s ease-in-out;
        }
        .container:hover{
            border-radius: 2px;
            background-color: rgb(237, 206, 139);
        }
        .guesses{
            background-color: bisque;
            border-radius: 20px;
            margin: 0 auto;
            position: relative;
            transition: 3s ease-in-out;
            width: 700px;
        }
        .num-input {
  width: 200px;
  padding: 12px 16px;
  font-size: 16px;
  border: 2px solid #ddd;
  border-radius: 10px;
  outline: none;
  transition: 0.3s ease;
}

/* focus effect */
.num-input:focus {
  border-color: #fdec00;
  box-shadow: 0 0 8px rgba(108, 99, 255, 0.3);
  width:280px;
  color: black;
  font-family: Cause;
}
.btns{
    padding: 1rem;
    display: flex;
    position: relative;
    margin: 0 auto;
    left: 30%;
    gap: 20px;

}
.subbtn{
    padding:15px;
    border-radius: 20px;
    font-family: Cause;
    font-weight: 900;
    background-color: #fdec00;
    transition: 0.3s;
}
.subbtn:hover{
    border-radius: 10px;
    transition: 0.1s ease-in-out;
    font-weight: 700;
    background-color: #f1ea8d;
}
.rstbtn{
    padding:15px;
    border-radius: 20px;
    font-family: Cause;
    font-weight: 900;
    background-color: #56abe3;
    transition: 0.3s;
}
.rstbtn:hover{
    border-radius: 10px;
    transition: 0.1s ease-in-out;
    font-weight: 700;
    background-color: #ed1919;
    
}
.info1 {
  opacity: 0;
  transition: 0.3s ease;
}

.rstbtn:hover ~ .info1 {
  opacity: 1;
}


    </style>
</head>
<body>
    <div CLASS="container">
    {% load static %}
    <h1 style="font-family: Cause; transition: 1s ease-in-out;font-size: 4.5vw;">ANUMANA</h1>
    <h1>Guess the number </h1><br>
    <h1> {{tnum}}</h1> <br>
    <form method="POST">
    {% csrf_token %}
    <input type="number" name="guessednum" placeholder="Enter a number" autofocus class="num-input"><br>
    <div class="btns">
    <button class="subbtn" type="submit">Submit</button>
    <button class="rstbtn" type="submit" name="reset">Reset</button>
    
    </div>
    <p class="info1">⚠️ Once you reset, the number will change.</p>
    <h5 class="typing">{{ result }}</h5>
    </div>
<br>
<div class="guesses">
    <h2> Your Attempts : {{attempts}}</h2>
    </div>
</form>
</body>
</html>
